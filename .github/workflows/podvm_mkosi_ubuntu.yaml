name: Create Ubuntu Pod VM image with mkosi

on:
  workflow_dispatch:
    inputs:
      registry:
        default: 'quay.io/confidential-containers'
        required: false
        type: string
      image_tag:
        default: ''
        required: false
        type: string
      git_ref:
        description: Git ref to checkout the cloud-api-adaptor repository.
        required: true
        type: string
      arch:
        description: Which arch we are building the mkosi image for
        default: 'amd64'
        required: false
        type: string
      debug:
        description: Whether to build the image in debug mode
        default: false
        required: false
        type: boolean

  workflow_call:
    inputs:
      registry:
        default: 'quay.io/confidential-containers'
        required: false
        type: string
      image_tag:
        default: ''
        required: false
        type: string
      git_ref:
        description: Git ref to checkout the cloud-api-adaptor repository.
        required: true
        type: string
      arch:
        description: Which arch we are building the mkosi image for
        default: 'amd64'
        required: false
        type: string
      debug:
        description: Whether to build the image in debug mode
        default: false
        required: false
        type: boolean
    secrets:
      QUAY_PASSWORD:
        required: true
    outputs:
      byom_e2e_image:
        description: The location of the BYOM e2e container image
        value: ${{ jobs.build-image.outputs.byom_e2e_image }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-mkosi-ubuntu-${{ inputs.arch }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: src/cloud-api-adaptor

permissions: {}

jobs:
  build-image:
    name: Build mkosi Ubuntu image for ${{ inputs.arch }}
    runs-on: ${{ inputs.arch == 's390x' && 's390x' || 'ubuntu-24.04' }}
    permissions:
      contents: read # Required if we want to run on a fork?
      packages: write # Required to publish the oras package to ghcr
      id-token: write # Required to publish the attestation provenance to ghcr
      attestations: write # Required to publish the attestation provenance to ghcr
      artifact-metadata: write # Required by actions/attest to write attestation metadata
    outputs:
      byom_e2e_image: ${{ steps.build_byom_e2e.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: "${{ inputs.git_ref }}"

      - name: Lowercase registry for ghcr.io
        id: registry_transform
        run: |
          if [[ "${{ inputs.registry }}" == ghcr.io* ]]; then
            echo "registry=$(echo '${{ inputs.registry }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          else
            echo "registry=${{ inputs.registry }}" >> $GITHUB_OUTPUT
          fi

      # Required by rootless mkosi
      - name: Un-restrict user namespaces
        if: inputs.arch == 'amd64'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Rebase the code
        if: github.event_name == 'pull_request_target'
        working-directory: ./
        run: |
          ./hack/ci-helper.sh rebase-atop-of-the-latest-target-branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to quay Container Registry
        if: ${{ startsWith(inputs.registry, 'quay.io') }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: quay.io
          username: ${{ vars.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Login to the ghcr Container registry
        if: ${{ startsWith(inputs.registry, 'ghcr.io') }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            alien \
            bubblewrap \
            dnf \
            qemu-utils \
            uidmap
          # yq may be pre-installed on self-hosted runners
          command -v yq || sudo snap install yq
          yq --version | grep -qE 'v4\.[0-9]+' || { echo "yq version is not 4.x, please install yq 4.x"; exit 1; }

      - name: Read properties from versions.yaml
        run: |
          echo "MKOSI_VERSION=$(yq -e '.tools.mkosi' versions.yaml)" >> "$GITHUB_ENV"
          echo "ORAS_VERSION=$(yq -e '.tools.oras' versions.yaml)" >> "$GITHUB_ENV"

      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: ${{ env.ORAS_VERSION }}

      - name: Build binaries for Ubuntu
        id: build_binaries
        working-directory: src/cloud-api-adaptor/podvm-mkosi
        run: make binaries
        env:
          ARCH: ${{ inputs.arch }}
          PODVM_DISTRO: ubuntu
          VERIFY_PROVENANCE: yes
          REGISTRY: ${{ steps.registry_transform.outputs.registry }}

      - name: Build and push BYOM e2e image (docker provider base)
        id: build_byom_e2e
        working-directory: src/cloud-api-adaptor/podvm-mkosi
        run: |
          tag=$(git rev-parse --short HEAD)
          # Build docker provider image first (base for BYOM)
          PODVM_TAG=${tag} make image-container
          PODVM_TAG=${tag} make push-image-container
          # Build BYOM e2e image (depends on docker image built above)
          PODVM_TAG=${tag} make image-byom-e2e-container
          PODVM_TAG=${tag} make push-image-byom-e2e-container
          arch=$(uname -m)
          arch=${arch/x86_64/amd64}
          echo "image=${{ steps.registry_transform.outputs.registry }}/podvm-byom-e2e-image-${arch}:${tag}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ steps.registry_transform.outputs.registry }}
          PODVM_DISTRO: ubuntu
